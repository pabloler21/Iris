services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: iris-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard web
      - "6334:6334"   # gRPC (para clients de alta performance)
    volumes:
      # Datos persistentes — si el contenedor se cae, los datos sobreviven
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      # Usamos /dev/tcp porque la imagen de Qdrant no incluye curl ni wget
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ai_intel:
    build: ./skills/ai_intel
    container_name: iris-ai-intel
    ports:
      - "8002:8002"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  search_my_docs:
    build: ./skills/search_my_docs
    container_name: iris-search-docs
    ports:
      - "8001:8001"
    environment:
      # Qdrant corre en la red interna de Docker — usamos el nombre del servicio
      - QDRANT_URL=http://qdrant:6333
      # API key de OpenRouter para embeddings (text-embedding-3-small)
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - EMBEDDING_MODEL=openai/text-embedding-3-small
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
