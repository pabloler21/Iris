services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: clawnest-qdrant
    ports:
      - "6333:6333"   # REST API + dashboard web
      - "6334:6334"   # gRPC (para clients de alta performance)
    volumes:
      # Datos persistentes — si el contenedor se cae, los datos sobreviven
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
